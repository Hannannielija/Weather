<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            margin-bottom: 10px;
            outline: none;
            background: #2a2a2a;
            color: white;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #4da6ff;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #3399ff;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .error {
            color: #ff4d4d;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌤 Weather</h1>

    <form method="POST">
        <input name="kota" placeholder="Masukkan kota..." required>
        <br>
        <button type="submit">Cek</button>
    </form>

    {% if cuaca %}
        {% if cuaca.error %}
            <p class="error">{{ cuaca.error }}</p>
        {% else %}
            <div class="result">
                <p><strong>Kota:</strong> {{ cuaca.kota }}</p>
                <p><strong>Suhu:</strong> {{ cuaca.temp }}°C</p>
                <p><strong>Kondisi:</strong> {{ cuaca.weather }}</p>
                <p><strong>Kelembapan:</strong> {{ cuaca.humidity }}%</p>
            </div>
        {% endif %}
    {% endif %}
</div>

</body>
</html>
